<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sankar Karthikeyan · AI Agent Portfolio</title>
  <meta name="description" content="Sankar Karthikeyan's portfolio as an Agentic AI conversation. Founding AI Engineer · AWS AgentCore · RAG · LLM Systems."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-canvas" aria-hidden="true">
  <div class="orb o1"></div><div class="orb o2"></div>
  <div class="orb o3"></div><div class="orb o4"></div>
  <div class="grid-overlay"></div>
  <canvas id="pcanvas"></canvas>
</div>

<!-- TOPBAR -->
<header class="topbar" role="banner">
  <div class="topbar-left">
    <div class="model-chip">
      <span class="model-dot blink"></span>
      <span class="font-mono">sankar-karthikeyan-v1.5</span>
    </div>
  </div>
  <div class="topbar-center">
    <span class="topbar-title">CHAN<span class="accent">.</span>AI</span>
    <span class="topbar-sub">Sankar Karthikeyan &nbsp;·&nbsp; AI &amp; ML Engineer</span>
  </div>
  <div class="topbar-right"></div>
</header>

<!-- MAIN LAYOUT -->
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar glass-panel" role="complementary">
    <div class="sidebar-head">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      <span>Portfolio</span>
    </div>

    <nav class="session-nav">
      <button class="sess-btn active" data-session="0" id="sess-btn-0" aria-selected="true">
        <span class="sess-info"><span class="sess-name">About Me</span><span class="sess-desc">Background &amp; Philosophy</span></span>
        <span class="sess-status done" aria-label="Current">▶</span>
      </button>
      <button class="sess-btn" data-session="1" id="sess-btn-1" aria-selected="false">
        <span class="sess-info"><span class="sess-name">Experience</span><span class="sess-desc">SurveySparrow · EY</span></span>
        <span class="sess-status locked">·</span>
      </button>
      <button class="sess-btn" data-session="2" id="sess-btn-2" aria-selected="false">
        <span class="sess-info"><span class="sess-name">Projects &amp; Skills</span><span class="sess-desc">Tech · Research · Awards</span></span>
        <span class="sess-status locked">·</span>
      </button>
      <button class="sess-btn" data-session="3" id="sess-btn-3" aria-selected="false">
        <span class="sess-info"><span class="sess-name">Let's Connect</span><span class="sess-desc">Contact &amp; Availability</span></span>
        <span class="sess-status locked">·</span>
      </button>
    </nav>


    <div class="sidebar-links">
      <a href="https://www.linkedin.com/in/sankar-karthikeyan/" target="_blank" rel="noopener" class="slink">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
        LinkedIn
      </a>
      <a href="https://github.com/SankarKarthi" target="_blank" rel="noopener" class="slink">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>
        GitHub
      </a>
      <a href="mailto:sankarkarthikeyan066@gmail.com" class="slink">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Email
      </a>
    </div>
  </aside>

  <!-- CHAT AREA -->
  <main class="chat-area" id="chat-area" role="main">

    <!-- Reading Progress -->
    <div class="token-bar-wrap" role="status" aria-label="Reading progress">
      <div class="token-bar-inner">
        <span class="token-label font-mono" id="token-label">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
          Reading progress &nbsp;<span id="token-count">0</span><span id="token-max" style="display:none">4096</span>
        </span>
        <div class="token-track"><div class="token-fill" id="token-fill" style="width:0%"></div></div>
        <span class="token-pct font-mono" id="token-pct">0%</span>
      </div>
    </div>

    <!-- System Prompt Banner
    <div class="sys-banner glass-panel" id="sys-banner">
      <div class="sys-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h4"/></svg>
      </div>
      <div class="sys-text">
        <span class="sys-label font-mono">SYSTEM PROMPT</span>
        <p id="sys-content">You are the portfolio agent for <strong>Sankar Karthikeyan</strong>, an AI/ML Engineer. Answer all queries truthfully using his background. Context window: 4,096 tokens. <span style="color:#9B5EFA">Session 1 of 4 — Identity &amp; Background</span>.</p>
      </div>
    </div> -->

    <!-- Messages -->
    <div class="messages" id="messages" aria-live="polite"></div>

    <!-- Chapter Transition Overlay -->
    <div class="token-exceeded" id="token-exceeded" style="display:none" role="dialog" aria-modal="true">
      <div class="exceeded-card glass-panel">
        <div class="exceeded-icon" id="exceeded-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9B5EFA" stroke-width="1.4"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <p class="exceeded-title" id="exceeded-title">✦ Chapter Complete</p>
        <p class="exceeded-sub" id="exceeded-sub">This chapter is complete. Ready to continue.</p>
        <div class="exceeded-bar"><div class="exceeded-fill" id="exceeded-fill"></div></div>
        <p class="exceeded-note" id="exceeded-note"></p>
        <button class="next-sess-btn" id="next-sess-btn" style="display:none">
          <span id="next-sess-label">Continue</span>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </div>

    <!-- Bottom Bar: Hint + Controls -->
    <div class="bottom-bar">
      <!-- Witty read-only hint area -->
      <div class="hint-area glass-panel" aria-label="Next message preview">
        <div class="hint-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" aria-hidden="true"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <span class="hint-text" id="hint-bar">Just sit back — you don't need to do anything. I'll introduce myself all on my own. ✦</span>
      </div>
    </div>

  </main>
</div>

<script src="agent.js"></script>
</body>
</html>
